    核心发现：
    1. IMediaSynchronizer 优先级体系：AUDIO_SINK=2 > VIDEO_SINK=0 > 其他（音频主时钟原则）
    2. 时间锚点机制：currentAnchorClockTime_ (系统纳秒) ↔ currentAnchorMediaTime_ (媒体微秒)
    3. 四步检查链 GetMediaTimeNow：CheckSeekingMediaTime → CheckPausedMediaTime → CheckIfMediaTimeIsNone → CheckFirstMediaTimeAfterSeek
    4. GetMediaTime 数学公式：mediaTime = anchorMediaTime + (clockTime - anchorClockTime + delayTime) × playRate - delayTime
    5. Preroll 同步：所有同步器报告首帧后统一触发 NotifyAllPrerolled
    6. Seek 操作：isSeeking_=true → 重置 Preroll → 重置锚点 → 等待第一帧
    7. Pause/Resume：暂停时保存 pausedMediaTime_，恢复时重设锚点
    8. SetPlaybackRate：变速播放，切换前重设锚点防止跳帧
    9. GetMaxMediaProgress：音频优先原则（锚点+缓冲时长 vs 视频PTS）
    10. LagDetector 卡顿检测：VideoSink LAG_LIMIT_TIME=100ms，AudioSink AudioLagDetector
    11. VideoSink 集成：VIDEO_SINK_START_FRAME=4 前4帧不丢帧
    12. AudioSink 集成：syncerPriority_=AUDIO_SINK(2) 最高优先级

