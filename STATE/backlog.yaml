## 执行约定

- 每次只从 pending 队列取 **1 个** 主题
- 完成后标记状态并更新备注（证据条数 / 是否已提问 / 是否已审批）
- 只有前一个主题完成审批（或拒绝归档）后才能开启下一个
- backlog 本身变更也需要 commit（增量更新）

