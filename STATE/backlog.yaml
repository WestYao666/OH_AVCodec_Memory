# backlog.yaml — 记忆工厂任务池

**来源**：根据耀耀设计的四类场景（新人入项 / 三方应用 / 新需求开发 / 问题定位修复）推导的首批微主题。  
**维护**：每次完成一个主题后更新状态。不得一次性填入过多任务。

