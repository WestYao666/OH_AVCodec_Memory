kind: code
ref: /home/west/OH_AVCodec/services/dfx/include/avcodec_xcollie.h
anchor: COLLIE_LISTEN / AVCodecXcollieInterfaceTimer
note: >
  便捷宏：COLLIE_LISTEN(statement, args...) 自动在 statement 期间
  开启 XCollie 超时监控，RAII 析构自动 CancelTimer
  默认 timeout=30s，isService=true 时走 ServiceInterfaceTimerCallback

