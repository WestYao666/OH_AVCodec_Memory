kind: code
ref: /home/west/OH_AVCodec/services/dfx/avcodec_xcollie.cpp
anchor: SetTimer / ServiceInterfaceTimerCallback
note: >
  XCollie 卡顿检测机制：
  - SetTimer(name, recovery, dumpLog, timeout, callback) 注册定时器
  - ServiceInterfaceTimerCallback 超时触发：写 FAULT_TYPE_FREEZE HiSysEvent，
    若 threadDeadlockCount_ >= threshold（默认1）则 _exit(-1) 杀进程
  - ClientInterfaceTimerCallback 超时触发：写 FAULT_TYPE_FREEZE，不杀进程
  - recovery=true 时触发恢复逻辑；dumpLog=true 时自动 dump 日志

---
kind: code
ref: /home/west/OH_AVCodec/services/dfx/avcodec_sysevent.cpp
anchor: FaultEventWrite(FaultType::FAULT_TYPE_FREEZE...)
note: >
  卡顿/超时 → FAULT_TYPE_FREEZE → HiSysEvent写入 "AV_CODEC" domain "FAULT"
  字段：MODULE / FAULTTYPE("Freeze") / MSG
  集成在 avcodec_xcollie.cpp 的 callback 中直接调用，形成
  "超时检测 → 上报事件 → 可选进程退出"的闭环

