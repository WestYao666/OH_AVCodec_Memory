key_findings:
  new_codec_steps:
    - step: 1. config.gni - 添加 feature flag
      detail: >
        添加 av_codec_enable_codec_XXX = false（默认关闭）到 declare_args 块，
        再在条件块中添加 av_codec_defines += ["SUPPORT_CODEC_XXX"]。
        这使 codec 默认不编译，通过产品配置打开。

    - step: 2. avcodec_codec_name.h - 添加 codec 名称常量
      detail: >
        在 interfaces/inner_api/native/avcodec_codec_name.h 中添加
        AUDIO_DECODER_XXX_NAME（或 VIDEO_DECODER_XXX_NAME）常量，
        用 #ifdef SUPPORT_CODEC_XXX 包裹。

    - step: 3. avcodec_mime_type.h - 添加 mime type 常量（如需）
      detail: >
        在 interfaces/inner_api/native/avcodec_mime_type.h 中添加
        MEDIA_MIMETYPE_AUDIO_XXX 常量，条件编译同上。

    - step: 4. kits/c/ - 扩展 C API 层（如需公开给应用）
      detail: >
        在 interfaces/kits/c/ 下对应头文件中添加 extern 声明，
        在 frameworks/native/capi/ 下添加实现。

    - step: 5. plugins/ffmpeg_adapter/ - 实现插件
      detail: >
        创建新子目录如 ffmpeg_adapter/audio_decoder/xxx/，
        实现 CodecPlugin 子类，包含 header + cpp 文件。
        关键：实现 RegisterXXXPlugins() 和 PLUGIN_DEFINITION 宏注册。

    - step: 6. BUILD.gn - 注册插件 target
      detail: >
        在对应子目录创建 BUILD.gn（参考 eac3/BUILD.gn），
        定义 ohos_shared_library target。
        在 services/media_engine/plugins/BUILD.gn 的 deps 列表中
        添加条件 deps。

    - step: 7. test/moduletest/ - 编写单测
      detail: >
        在 test/moduletest/ 对应子目录下添加测试源文件，
        在 BUILD.gn 的 sources 中注册。
        使用 gtest 框架，遵循 NativeFunctionTest 模式。

  plugin_registration_mechanism:
    summary: >
      插件通过 PLUGIN_DEFINITION 宏注册，该宏来自 plugin/plugin_definition.h
     （外部 plugin 框架）。宏在 .so 库加载时自动调用注册函数，
      将 CodecPluginDef（包含 name/type/rank/creator/capability）通过
      reg->AddPlugin() 注入到 PluginManager 框架中。
    registration_point: "每个 plugin cpp 文件末尾的 PLUGIN_DEFINITION(...) 宏"
    discovery: "Build 系统在 plugins/BUILD.gn 的 deps 列表中指明所有插件 target，编译成独立 .so"

  demuxer_muxer_new:
    demuxer_registration: >
      demuxer 插件与 audio decoder 相同模式，PLUGIN_DEFINITION 在
      ffmpeg_demuxer/ffmpeg_demuxer_plugin.cpp 第4125行。
      框架通过 MuxerPluginDef / DemuxerPluginDef 注册。
    muxer_registration: >
      muxer 在 ffmpeg_adapter/muxer/ffmpeg_muxer_register.cpp 第33行
      PLUGIN_DEFINITION(FFmpegMuxer, ...) 注册。

  build_system_key_files:
    - /home/west/OH_AVCodec/config.gni                    # 全局 feature flag
    - /home/west/OH_AVCodec/services/BUILD.gn             # 服务层汇总
    - /home/west/OH_AVCodec/services/media_engine/plugins/BUILD.gn  # 插件汇总
    - /home/west/OH_AVCodec/interfaces/kits/c/BUILD.gn    # C API kits 层

  no_codeowners: true
  no_contributing_md: true
  contribution_model: "OpenHarmony 标准 PR 流程（README.md 描述）"

